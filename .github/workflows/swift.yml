name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Build Xcode Project
      run: xcodebuild -project ios/Adaptable/Adaptable.xcodeproj -scheme Adaptable -destination 'generic/platform=iOS Simulator' build
